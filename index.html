<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Greenstead — Luxury Farm Stay Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.460.0/font/lucide.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --primary:#1B5E20; --primary-2:#2E7D32; --accent:#D4AF37;
  --bg:#FAFAF7; --card:#FFFFFF; --text:#1F2937; --muted:#6B7280;
  --border:#E7E5DE; --soft:#F1EFE8; --danger:#B3261E;
  --shadow-sm:0 1px 2px rgba(20,30,15,.05),0 1px 1px rgba(20,30,15,.04);
  --shadow:0 8px 24px rgba(20,30,15,.07),0 2px 6px rgba(20,30,15,.04);
  --shadow-lg:0 24px 60px rgba(20,30,15,.12);
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em;margin:0 0 .4em}
h1{font-size:clamp(2.2rem,5vw,3.6rem);line-height:1.05}
h2{font-size:clamp(1.6rem,3vw,2.2rem)}
h3{font-size:1.2rem}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.container{max-width:1240px;margin:0 auto;padding:0 24px}
.muted{color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--soft);color:var(--primary);padding:6px 12px;border-radius:999px;font-size:.78rem;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;padding:11px 18px;border-radius:10px;font-weight:600;font-size:.92rem;cursor:pointer;transition:all .2s ease;background:transparent;color:var(--text);font-family:inherit}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.btn i{font-size:1rem}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#16441a;transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-gold{background:var(--accent);color:#1a1a1a}
.btn-gold:hover{background:#c4a02f}
.btn-outline{border-color:var(--border);background:#fff}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost:hover{background:var(--soft)}
.btn-sm{padding:8px 12px;font-size:.82rem;border-radius:8px}
.btn-block{width:100%;justify-content:center}
input,select,textarea{font-family:inherit;font-size:.92rem;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:#fff;width:100%;color:var(--text);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(27,94,32,.08)}
label{display:block;font-size:.8rem;font-weight:600;margin-bottom:6px;color:#374151}
.grid{display:grid;gap:24px}
.row{display:flex;gap:16px;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden}
.pad{padding:24px}
.divider{height:1px;background:var(--border);margin:20px 0}

/* Header */
header.nav{position:sticky;top:0;z-index:50;background:rgba(250,250,247,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1320px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;color:var(--primary)}
.logo .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:grid;place-items:center;color:#fff;font-size:1.05rem}
nav.links{display:flex;gap:6px}
nav.links a{padding:8px 14px;border-radius:8px;font-size:.9rem;font-weight:500;color:#374151}
nav.links a:hover{background:var(--soft);color:var(--primary)}
.nav-actions{display:flex;gap:8px;align-items:center}
/* Booking Progress – premium Airbnb / MakeMyTrip style */
.booking-progress{background:#fff;border-bottom:1px solid var(--border);box-shadow:0 2px 14px rgba(20,30,15,.04);position:relative;z-index:20}
.bp-inner{max-width:1240px;margin:0 auto;padding:22px 24px}
.bp-steps{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;flex-wrap:wrap}
.bp-step{flex:1;min-width:240px;position:relative;padding:0 12px}
.bp-step-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bp-num{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:.88rem;flex-shrink:0;transition:all .25s;background:#f1f0ea;color:#7a8478;border:2px solid #e4e2d6}
.bp-step.done .bp-num{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 0 4px rgba(27,94,32,.12)}
.bp-step.current .bp-num{background:#fff;color:var(--primary);border-color:var(--primary);box-shadow:0 0 0 4px rgba(27,94,32,.13)}
.bp-step.future .bp-num{background:#f5f4f0;color:#a9b0a6}
.bp-step-title{font-weight:700;font-size:.95rem;color:#2d352e}
.bp-step-sub{font-size:.76rem;color:var(--muted);margin-top:1px}
.bp-step.done .bp-step-title{color:var(--primary)}
.bp-step.current .bp-step-title{color:var(--primary-2)}
.bp-connector{position:absolute;top:18px;left:calc(50% + 22px);right:calc(-50% + 22px);height:2px;background:#e7e5de;z-index:0}
.bp-step.done .bp-connector{background:linear-gradient(90deg,var(--primary),var(--primary-2))}
.bp-step:last-child .bp-connector{display:none}
.bp-details{margin-top:2px;padding-left:48px;font-size:.79rem;line-height:1.55;color:#556056}
.bp-details .bp-k{color:#8b9288}
.bp-details .bp-v{color:#1f2937;font-weight:600;margin-left:4px}
.bp-details .bp-check{color:var(--primary);margin-right:4px}
.bp-empty{color:#9aa39c;font-style:italic}
.bp-mobile-bar{display:none}
@media(max-width:900px){
  .bp-steps{flex-direction:column;gap:18px}
  .bp-step{min-width:unset;width:100%;padding:0}
  .bp-connector{display:none !important}
  .bp-details{padding-left:48px}
}
@media(max-width:520px){
  .bp-inner{padding:16px 18px}
  .bp-details{font-size:.76rem}
}
/* keep legacy task-band classes for fallback */
.task-band{background:#fff;border-bottom:1px solid var(--border)}
.task-band-inner{max-width:1320px;margin:0 auto;padding:14px 24px}
.task-band-steps{display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.task-band-step{display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600;color:#9aa39c}
.task-band-step .task-band-dot{width:9px;height:9px;border-radius:50%;background:#d8dcd4;display:inline-block}
.task-band-step.done{color:var(--primary)}
.task-band-step.done .task-band-dot{background:var(--primary)}
.task-band-step.current{color:var(--primary-2)}
.task-band-step.current .task-band-dot{background:var(--primary-2);box-shadow:0 0 0 3px rgba(46,125,50,.18)}
.task-band-track{position:relative;height:8px;border-radius:999px;background:var(--soft);overflow:hidden}
.task-band-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary-2),var(--primary));transition:width .4s ease}
.nav-band{background:var(--soft);border-bottom:1px solid var(--border)}
.nav-band-inner{display:flex;justify-content:center;gap:8px;padding:12px 24px;flex-wrap:wrap}
.nav-band-inner a{padding:8px 16px;border-radius:8px;font-size:.9rem;font-weight:600;color:#374151;cursor:pointer}
.nav-band-inner a:hover{background:#fff;color:var(--primary)}
.farm-filter label{display:block;font-size:.8rem;font-weight:600;color:#5b6660;margin-bottom:6px}
.chip-row{display:flex;flex-wrap:nowrap;gap:8px;margin-top:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;padding-bottom:4px}
.chip-row .chip{flex:0 0 auto}
.chip{border:1px solid var(--border);background:#fff;color:var(--text);padding:7px 14px;border-radius:999px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--primary)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.menu-btn{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text)}
@media(max-width:900px){nav.links{display:none}.menu-btn{display:block}.nav-actions .btn:not(.btn-primary){display:none}}

/* Hero Banner - Premium Karnataka Farm Stay */
.hero-premium{position:relative;width:100%;height:72vh;min-height:560px;max-height:820px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff}
.hero-premium-bg{position:absolute;inset:0;z-index:1;background-size:cover;background-position:center 35%;transform:scale(1.02);transition:transform 8s ease}
.hero-premium:hover .hero-premium-bg{transform:scale(1.06)}
.hero-premium-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(120deg,rgba(8,22,10,.72) 0%,rgba(8,22,10,.45) 45%,rgba(8,22,10,.28) 100%), linear-gradient(to top,rgba(5,14,7,.55) 0%,transparent 55%)}
.hero-premium-content{position:relative;z-index:3;text-align:center;max-width:980px;padding:40px 24px}
.hero-premium .eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:8px 16px;border-radius:999px;font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#f0e6c8;margin-bottom:22px}
.hero-premium .eyebrow i{color:var(--accent)}
.hero-premium h1{font-family:'Fraunces',Georgia,serif;font-size:clamp(2.4rem,5.6vw,4.4rem);line-height:1.04;color:#fff;margin:0 0 18px;letter-spacing:-.015em;text-shadow:0 2px 24px rgba(0,0,0,.35)}
.hero-premium .subtitle{font-size:clamp(1rem,1.6vw,1.25rem);color:rgba(255,255,255,.88);max-width:720px;margin:0 auto 34px;line-height:1.6;font-weight:400}
.hero-cta{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--accent),#e8c04a);color:#1a1400;font-weight:700;padding:16px 34px;border-radius:14px;font-size:1.02rem;box-shadow:0 10px 30px rgba(212,175,55,.28),0 2px 8px rgba(0,0,0,.2);transition:all .25s ease;border:none;cursor:pointer}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(212,175,55,.35),0 4px 12px rgba(0,0,0,.22);background:linear-gradient(135deg,#e8c04a,var(--accent))}
.hero-cta i{font-size:1.15rem}
.hero-trust{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-top:34px;font-size:.86rem;color:rgba(255,255,255,.78)}
.hero-trust span{display:flex;align-items:center;gap:7px}
.hero-trust i{color:var(--accent);font-size:.95rem}
.hero-scroll{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:3;color:rgba(255,255,255,.7);font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:8px}
.hero-scroll .mouse{width:22px;height:34px;border:1.5px solid rgba(255,255,255,.5);border-radius:12px;position:relative}
.hero-scroll .mouse::after{content:"";position:absolute;top:6px;left:50%;transform:translateX(-50%);width:3px;height:6px;background:rgba(255,255,255,.8);border-radius:2px;animation:scrollDot 1.8s infinite}
@keyframes scrollDot{0%{opacity:1;top:6px}50%{opacity:.3;top:12px}100%{opacity:1;top:6px}}
@media(max-width:780px){.hero-premium{height:76vh;min-height:520px}.hero-premium-content{padding:28px 20px}.hero-trust{gap:14px;font-size:.8rem}.hero-scroll{display:none}}
/* legacy hero kept for compatibility */
.hero{position:relative;width:100%;height:42vh;min-height:260px;max-height:420px;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:1;background:url('https://images.unsplash.com/photo-1518780664697-55e3ad937233?w=1920') center/cover;background-position:center}
.hero-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,rgba(15,35,15,.22) 0%,rgba(15,35,15,.04) 50%,rgba(15,35,15,.22) 100%)}
@media(max-width:780px){.hero{height:34vh;min-height:220px}}


/* Sections */
section.block{padding:70px 0}
.section-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.section-head .sub{color:var(--muted);max-width:540px;margin-top:6px}

/* Cards grid */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.farm-card{background:#fff;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);transition:all .25s;cursor:pointer}
.farm-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:#d8d3c4}
.farm-card .thumb{aspect-ratio:4/3;background-size:cover;background-position:center;position:relative}
.farm-card .thumb .fav{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;color:#333;border:none;cursor:pointer}
.farm-card .thumb .fav:hover{color:var(--danger)}
.farm-card .info{padding:16px 18px 20px}
.farm-card .info .loc{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.85rem;margin-bottom:4px}
.farm-card .info .loc .rating{color:var(--text);display:flex;align-items:center;gap:4px;font-weight:600}
.farm-card .info .loc .rating i{color:var(--accent)}
.farm-card .info h3{font-family:'Inter',sans-serif;font-size:1rem;margin:2px 0 6px;font-weight:600}

.farm-card .price{font-weight:700;color:var(--text)}
.farm-card .price span{color:var(--muted);font-weight:500;font-size:.85rem}

/* Destinations */
.dest-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:240px 240px;gap:18px}
.dest{border-radius:16px;background-size:cover;background-position:center;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s}
.dest:hover{transform:scale(1.01)}
.dest::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent 60%)}
.dest .label{position:absolute;left:18px;bottom:14px;color:#fff;z-index:1}
.dest .label b{font-family:'Fraunces',serif;font-size:1.3rem;display:block}
.dest:nth-child(1){grid-row:span 2}
@media(max-width:780px){.dest-grid{grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,180px)}.dest:nth-child(1){grid-row:auto;grid-column:span 2}}

/* Activities */
.act-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px}
.act{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 18px;text-align:center;transition:.2s;cursor:pointer}
.act:hover{border-color:var(--primary);background:linear-gradient(180deg,#fff,#f4f7f1)}
.act i{font-size:1.8rem;color:var(--primary);background:var(--soft);width:54px;height:54px;border-radius:14px;display:grid;place-items:center;margin:0 auto 10px}
.act b{display:block;margin-bottom:2px}
.act span{color:var(--muted);font-size:.82rem}

/* Why */
.why{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px}
.why .item{padding:24px;border:1px solid var(--border);border-radius:14px;background:#fff}
.why .item i{color:var(--accent);font-size:1.5rem;background:#fbf6e3;width:48px;height:48px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px}

/* Testimonials */
.tst-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.tst{padding:28px;border-radius:16px;background:linear-gradient(180deg,#fff,#f6f4ec);border:1px solid var(--border)}
.tst .stars{color:var(--accent);margin-bottom:10px}
.tst .who{display:flex;gap:12px;align-items:center;margin-top:18px}
.tst .who img{width:42px;height:42px;border-radius:50%;object-fit:cover}

/* CTA */
.cta{background:linear-gradient(135deg,var(--primary),#0f3b13);color:#fff;border-radius:24px;padding:60px;display:grid;grid-template-columns:1.5fr 1fr;align-items:center;gap:30px;position:relative;overflow:hidden}
.cta::before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(212,175,55,.15);right:-80px;top:-80px}
.cta h2{color:#fff}
.cta p{opacity:.85;max-width:480px}
@media(max-width:780px){.cta{grid-template-columns:1fr;padding:36px}}

/* Footer */
footer{background:#11281a;color:#cfd8d0;padding:60px 0 24px;margin-top:60px}
footer h4{color:#fff;font-family:'Inter',sans-serif;font-size:.95rem;margin-bottom:14px}
.foot-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:30px}
@media(max-width:780px){.foot-grid{grid-template-columns:1fr 1fr}}
footer a{display:block;padding:5px 0;font-size:.88rem;color:#a8b6ab}
footer a:hover{color:#fff}
.foot-bottom{margin-top:40px;padding-top:20px;border-top:1px solid #1f3a26;display:flex;justify-content:space-between;color:#7c8b80;font-size:.82rem;flex-wrap:wrap;gap:12px}

/* Auth */
.auth-wrap{min-height:calc(100vh - 80px);display:grid;grid-template-columns:1fr 1fr}
.auth-side{background:linear-gradient(135deg,#1B5E20,#0f3b13) url('https://images.unsplash.com/photo-1500076656116-558758c991c1?w=1200') center/cover;background-blend-mode:overlay;display:flex;flex-direction:column;justify-content:end;padding:50px;color:#fff}
.auth-side h2{color:#fff}
.auth-form{padding:60px;display:flex;flex-direction:column;justify-content:center;max-width:520px;margin:0 auto;width:100%}
@media(max-width:880px){.auth-wrap{grid-template-columns:1fr}.auth-side{min-height:200px;padding:24px}.auth-form{padding:30px}}

/* Dashboard */
.dash{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 70px)}
.side{background:#fff;border-right:1px solid var(--border);padding:24px 16px}
.side .me{display:flex;gap:10px;align-items:center;padding:10px;border-radius:10px;background:var(--soft);margin-bottom:20px}
.side .me .av{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:700}
.side nav a{display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:8px;color:#374151;font-size:.9rem;font-weight:500;margin-bottom:2px;cursor:pointer}
.side nav a:hover,.side nav a.active{background:var(--soft);color:var(--primary)}
.side .sec{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:18px 12px 8px}
.dash-main{padding:32px;background:var(--bg)}
@media(max-width:880px){.dash{grid-template-columns:1fr}.side{display:none}}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:24px}
.stat{background:#fff;padding:20px;border-radius:14px;border:1px solid var(--border)}
.stat .lab{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.05em}
.stat b{display:block;font-size:1.7rem;font-family:'Fraunces',serif;color:var(--primary);margin:4px 0 2px}
.stat .delta{color:#0a7d2a;font-size:.78rem;font-weight:600}
.stat .delta.neg{color:#c93535}

.table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--border);font-size:.9rem}
.table th,.table td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--border)}
.table th{background:#fafaf5;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.table tr:last-child td{border:none}
.pill{padding:4px 10px;border-radius:999px;font-size:.74rem;font-weight:600;display:inline-block}
.pill.ok{background:#e8f5ea;color:#0a7d2a}
.pill.warn{background:#fff4d6;color:#8a6300}
.pill.bad{background:#fde7e6;color:#9a1d18}
.pill.info{background:#e6effb;color:#1f4fa3}

/* Admin: farm row actions + delete confirm modal */
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#8f1e17}
.btn-outline.danger{color:var(--danger);border-color:#f3c9c6}
.btn-outline.danger:hover{background:#fde7e6;border-color:var(--danger)}
.confirm-overlay{position:fixed;inset:0;background:rgba(15,20,15,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;border-radius:16px;max-width:380px;width:100%;padding:30px 26px;box-shadow:var(--shadow-lg);text-align:center}
.confirm-box .icon-circle{font-size:1.4rem;color:var(--danger);background:#fde7e6;width:52px;height:52px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px}
.confirm-box h3{margin-bottom:6px}
.confirm-box p{color:var(--muted);margin-bottom:22px;font-size:.9rem;line-height:1.5}
.confirm-box .row{display:flex;gap:10px;justify-content:center}
.confirm-box .row .btn{flex:1}

/* Gallery */
.gal{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:240px 240px;gap:8px;border-radius:18px;overflow:hidden}
.gal div{background-size:cover;background-position:center}
.gal div:nth-child(1){grid-row:span 2}
@media(max-width:780px){.gal{grid-template-columns:1fr 1fr;grid-template-rows:200px}.gal div:nth-child(1){grid-row:auto;grid-column:span 2;height:220px}}

.detail-grid{display:grid;grid-template-columns:1fr 380px;gap:40px;margin-top:30px}
@media(max-width:980px){.detail-grid{grid-template-columns:1fr}}
.book-card{position:sticky;top:90px;border:1px solid var(--border);border-radius:16px;padding:24px;background:#fff;box-shadow:var(--shadow)}

.amenity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.amenity{display:flex;gap:10px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:10px}
.amenity i{color:var(--primary)}

.room-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.room-gallery img{width:100%;height:150px;object-fit:cover;border-radius:12px;display:block}

.tourist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.tourist-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff}
.tourist-card img{width:100%;height:130px;object-fit:cover;display:block}
.tourist-card .tc-body{padding:12px 14px}
.tourist-card .tc-body b{display:block;margin-bottom:4px}

/* Notif */
.notif{display:flex;gap:14px;padding:16px;border:1px solid var(--border);border-radius:12px;background:#fff;align-items:start;margin-bottom:10px}
.notif .ic{width:40px;height:40px;border-radius:10px;background:var(--soft);color:var(--primary);display:grid;place-items:center;flex-shrink:0}

/* Mobile menu drawer */
.drawer{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none}
.drawer.open{display:block}
.drawer .panel{background:#fff;width:280px;height:100%;padding:24px;display:flex;flex-direction:column;gap:6px}
.drawer .panel a{padding:12px;border-radius:8px;font-weight:500}
.drawer .panel a:hover{background:var(--soft)}

/* 404 */
.fourofour{min-height:80vh;display:grid;place-items:center;text-align:center;padding:40px}
.fourofour .code{font-family:'Fraunces',serif;font-size:9rem;color:var(--primary);line-height:1}

/* Availability animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeInMsg{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

function taskBand(step){
  const s = window.__searchState || {};
  const a = window.__availabilityState || {};
  const b = window.__bookingState || {};
  const steps = [
    {
      n:1, title:'Search Farm', sub:'Find your perfect stay',
      done: step>1,
      current: step===1,
      details: s.farm||s.city||s.district ? `
        ${s.farm?`<div><span class="bp-check">✔</span><span class="bp-k">Farm:</span><span class="bp-v">${s.farm}</span></div>`:''}
        ${s.city?`<div><span class="bp-check">✔</span><span class="bp-k">City:</span><span class="bp-v">${s.city}</span></div>`:''}
        ${s.district?`<div><span class="bp-check">✔</span><span class="bp-k">District:</span><span class="bp-v">${s.district}</span></div>`:''}
        ${s.food?`<div><span class="bp-check">✔</span><span class="bp-k">Food:</span><span class="bp-v">${s.food}</span></div>`:''}
        ${s.activity?`<div><span class="bp-check">✔</span><span class="bp-k">Activity:</span><span class="bp-v">${s.activity}</span></div>`:''}
      ` : `<div class="bp-empty">Select farm, city & filters</div>`
    },
    {
      n:2, title:'Check Availability', sub:'Dates & times',
      done: step>2,
      current: step===2,
      details: a.fromDate ? `
        <div><span class="bp-check">✔</span><span class="bp-k">From:</span><span class="bp-v">${a.fromDate}${a.checkinTime? ' · '+a.checkinTime:''}</span></div>
        <div><span class="bp-check">✔</span><span class="bp-k">To:</span><span class="bp-v">${a.toDate||''}${a.checkoutTime? ' · '+a.checkoutTime:''}</span></div>
        ${a.checkinTime?`<div><span class="bp-check">✔</span><span class="bp-k">Check-in:</span><span class="bp-v">${a.checkinTime}</span></div>`:''}
        ${a.checkoutTime?`<div><span class="bp-check">✔</span><span class="bp-k">Check-out:</span><span class="bp-v">${a.checkoutTime}</span></div>`:''}
      ` : `<div class="bp-empty">Pick your travel dates</div>`
    },
    {
      n:3, title:'Booking', sub:'Confirm & pay',
      done: false,
      current: step===3,
      details: step>=3 ? `
        <div><span class="bp-check">✔</span><span class="bp-k">Guests:</span><span class="bp-v">${b.guests||2} guests</span></div>
        <div><span class="bp-check">✔</span><span class="bp-k">Total:</span><span class="bp-v">₹${b.total||'-'}</span></div>
        <div><span class="bp-check">✔</span><span class="bp-k">Status:</span><span class="bp-v">${b.status||'In progress'}</span></div>
      ` : `<div class="bp-empty">Complete guest details</div>`
    }
  ];
  return `
  <div class="booking-progress">
    <div class="bp-inner">
      <div class="bp-steps">
        ${steps.map((st, i)=>`
          <div class="bp-step ${st.done?'done':''} ${st.current?'current':'future'}" style="cursor:pointer;transition:all 0.2s" onclick="${
            st.n === 1 ? "navInPlace('home')" :
            st.n === 2 ? "navInPlace('availability')" :
            st.n === 3 ? `navInPlace('details', {id: ${b.farmId || 1}})` : ""
          }">
            <div class="bp-connector"></div>
            <div class="bp-step-head">
              <div class="bp-num">${st.done ? '✓' : st.n}</div>
              <div>
                <div class="bp-step-title" style="text-decoration:underline">${st.title}</div>
                <div class="bp-step-sub">${st.sub}</div>
              </div>
            </div>
            <div class="bp-details">${st.details}</div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
}

function uniqueVals(arr){return [...new Set(arr.filter(Boolean))].sort()}

function initHomeFilters(){
  const nameSel=document.getElementById('f-name');
  const citySel=document.getElementById('f-city');
  if(!citySel) return;
  const distSel=document.getElementById('f-district');
  const touristSel=document.getElementById('f-tourist');
  const foodSel=document.getElementById('f-food');
  const activitySel=document.getElementById('f-activity');

  uniqueVals(FARMS.map(f=>f.name)).forEach(n=>nameSel.insertAdjacentHTML('beforeend',`<option value="${n}">${n}</option>`));
  Object.keys(karnataka).sort().forEach(d=>distSel.insertAdjacentHTML('beforeend',`<option value="${d}">${d}</option>`));
  Object.values(karnataka).flat().sort().forEach(c=>citySel.insertAdjacentHTML('beforeend',`<option value="${c}">${c}</option>`));
  uniqueVals(FARMS.flatMap(f=>(f.touristPlaces||[]).map(t=>t.name))).forEach(t=>touristSel.insertAdjacentHTML('beforeend',`<option value="${t}">${t}</option>`));
  ["Veg","Non-Veg","Veg & Non-Veg"].forEach(fp=>foodSel.insertAdjacentHTML('beforeend',`<option value="${fp}">${fp}</option>`));
  uniqueVals(FARMS.flatMap(f=>f.activities||[])).forEach(a=>activitySel.insertAdjacentHTML('beforeend',`<option value="${a}">${a}</option>`));
}
function applyHomeFilters(){
  const name=document.getElementById('f-name').value;
  const city=document.getElementById('f-city').value;
  const district=document.getElementById('f-district').value;
  const tourist=document.getElementById('f-tourist').value;
  const food=document.getElementById('f-food').value;
  const activity=document.getElementById('f-activity').value;

  // Save search state for progress band
  window.__searchState = {
    farm: name || '',
    city: city || '',
    district: district || '',
    tourist: tourist || '',
    food: food || '',
    activity: activity || ''
  };

  const filtered=FARMS.filter(f=>{
    if(name && f.name!==name) return false;
    if(city && f.city!==city) return false;
    if(district && f.district!==district) return false;
    if(tourist && !(f.touristPlaces||[]).some(t=>t.name.toLowerCase().includes(tourist.toLowerCase()))) return false;
    if(food && f.foodpreference!==food && f.foodpreference!=='Veg & Non-Veg') return false;
    if(activity && !(f.activities||[]).includes(activity)) return false;
    return true;
  });
  const container=document.getElementById('home-farm-cards');
  container.innerHTML=filtered.length?filtered.map(farmCard).join(''):`<p class="muted">No farms match your filters.</p>`;
  window.__homeFilteredFarms=filtered;
  // refresh progress band in DOM if present
  const bp = document.querySelector('.booking-progress');
  if(bp){ bp.outerHTML = taskBand(1); }
}
function resetHomeFilters(){
  document.getElementById('f-name').value='';
  document.getElementById('f-district').value='';
  const citySel=document.getElementById('f-city');
  citySel.innerHTML='<option value="">All Cities</option>'+Object.values(karnataka).flat().sort().map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('f-tourist').value='';
  document.getElementById('f-food').value='';
  document.getElementById('f-activity').value='';
  window.__homeFilteredFarms=null;
  window.__searchState = {};
  document.getElementById('home-farm-cards').innerHTML=FARMS.slice(0,4).map(farmCard).join('');
  const bp = document.querySelector('.booking-progress');
  if(bp){ bp.outerHTML = taskBand(1); }
}

route('details',(p)=>{
  const f=FARMS.find(x=>x.id==(p.id||1))||FARMS[0];
  const a = window.__availabilityState || {};
  const hasDates = a.fromDateRaw && a.toDateRaw;
  const ciVal = hasDates ? a.fromDateRaw : '';
  const coVal = hasDates ? a.toDateRaw : '';
  let nights = 4;
  if (hasDates) {
    const d1 = new Date(a.fromDateRaw), d2 = new Date(a.toDateRaw);
    nights = Math.max(1, Math.round((d2-d1)/(1000*60*60*24)) || 4);
  }
  const subTotal = f.price * nights;
  const cleaning = 3200;
  const service = 2240;
  const totalVal = subTotal + cleaning + service;

  // update booking state
  window.__bookingState = {guests:2, nights:nights, total: totalVal, status:'Ready to book', farmId:f.id, farmName:f.name};

  // Auto-fill dates from availability state
  setTimeout(() => {
    const ci = document.getElementById('bk-checkin');
    const co = document.getElementById('bk-checkout');
    const msgArea = document.getElementById('bk-msg-area');
    const btn = document.getElementById('bookingContinueBtn');

    if (ci && co) {
      if (a.fromDateRaw) ci.value = a.fromDateRaw;
      if (a.toDateRaw) co.value = a.toDateRaw;
      
      const datesExist = a.fromDateRaw && a.toDateRaw;
      const isVerified = a.availabilityVerified || window.availabilityVerified;

      if (datesExist && isVerified) {
        if (typeof recalcBooking === 'function') recalcBooking(f.price);
        if (msgArea) msgArea.style.display = 'none';
      } else {
        if (!datesExist) {
          ci.value = '';
          co.value = '';
        }
        if (msgArea) {
          msgArea.style.display = 'block';
          msgArea.style.background = '#FEE2E2';
          msgArea.style.border = '1px solid #FECACA';
          msgArea.style.color = '#991B1B';
          msgArea.innerHTML = `<i class="i-lucide-alert-triangle" style="margin-right:6px"></i> Please check availability before booking.`;
        }
        if (btn) {
          btn.disabled = true;
        }
      }
    }
  }, 80);
  const AMENITIES = [
    ['wifi','Free WiFi'],['utensils-crossed','Farm-to-table meals'],['waves','River access'],
    ['flame','Bonfire pit'],['car','Free parking'],['leaf','Organic garden'],
    ['coffee','Coffee estate tour'],['bicycle','Bicycles'],['dog','Pet friendly','(on request)'],
    ['shield-check','24/7 support'],['snowflake','AC rooms'],['bath','Hot water']
  ];
  return `${header()}
  ${taskBand(3)}
  <section style="padding:28px 0 10px"><div class="container">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:16px;flex-wrap:wrap">
      <div>
        <div class="badge" style="margin-bottom:10px"><i class="i-lucide-map-pin"></i> ${f.district}, Karnataka · Verified</div>
        <h1 style="font-size:clamp(1.8rem,3vw,2.4rem);margin-bottom:6px">${f.name}</h1>
        <div class="muted" style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:.92rem">
          <span><i class="i-lucide-star" style="color:var(--accent)"></i> <b>${f.rating}</b> · ${f.reviews} reviews</span>
          <span>·</span>
          <span><i class="i-lucide-map-pin"></i> ${f.city}, ${f.district}</span>
          <span>·</span>
          <span><i class=\"i-lucide-utensils\"></i> ${f.foodpreference}</span>
        </div>
      </div>
      <div style="text-align:right">
      </div>
    </div>
  </div></section>

  <section style="padding:0 0 10px"><div class="container">
    <div style="border-radius:20px;overflow:hidden;position:relative">
      <img src="${f.img}" style="width:100%;height:520px;object-fit:cover;display:block" alt="${f.name}">
      <div style="position:absolute;left:18px;bottom:18px;background:rgba(0,0,0,.48);backdrop-filter:blur(6px);color:#fff;padding:8px 14px;border-radius:10px;font-size:.85rem">
        <i class="i-lucide-camera"></i> 1 / ${(f.roomImages||[]).length+1} · Coffee estate · Karnataka farm stay
      </div>
    </div>
  </div></section>

  <section style="padding:24px 0 60px"><div class="container">
    <div class="detail-grid">
      <div>
        <div class="card pad" style="margin-bottom:22px">
          <h2 style="margin-bottom:10px">About this farm stay</h2>
          <p class="muted" style="line-height:1.7">
            Wake up to misty Coorg mornings surrounded by ${ (f.activities||[]).join(', ') || 'coffee plantations'}.

/* Availability Verified State */
window.availabilityVerified = false;

function handleAvailabilityDateChange() {
  window.availabilityVerified = false;
  const btns = document.querySelectorAll('.book-now-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.style.cursor = 'not-allowed';
    btn.style.pointerEvents = 'none';
    btn.style.background = '#9CA3AF';
    btn.style.borderColor = '#9CA3AF';
  });
  const msgEl = document.getElementById('av-msg');
  if (msgEl) msgEl.innerHTML = '';
  const warnEl = document.getElementById('av-date-warn');
  if (warnEl) warnEl.style.display = 'none';
}

function applyAvailabilityFilter(){
  const fromDate=document.getElementById('av-from-date').value;
  const toDate=document.getElementById('av-to-date').value;
  const container=document.getElementById('availability-farm-cards');
  const source=window.__homeFilteredFarms||FARMS;
  const msgEl = document.getElementById('av-msg');
  const warnEl = document.getElementById('av-date-warn');
  const btn = document.querySelector('.btn-primary[onclick="applyAvailabilityFilter()"]');

  // Hide previous messages
  if(warnEl) warnEl.style.display = 'none';
  if(msgEl) msgEl.innerHTML = '';

  // Validate: both dates selected
  if(!fromDate || !toDate){
    window.availabilityVerified = false;
    if(warnEl) warnEl.style.display = 'block';
    return;
  }

  // Validate: dates not in the past
  const today = new Date();
  today.setHours(0,0,0,0);
  const from = new Date(fromDate);
  const to = new Date(toDate);
  if(from < today || to < today){
    window.availabilityVerified = false;
    if(msgEl) msgEl.innerHTML = '<div style="display:inline-block;padding:14px 28px;border-radius:12px;background:#FEE2E2;border:1px solid #FECACA;color:#991B1B;font-size:.95rem;font-weight:600;animation:fadeInMsg .4s ease"><i class="i-lucide-x-circle" style="margin-right:8px"></i> Selected dates cannot be in the past.</div>';
    return;
  }

  // Validate: from before to
  if(fromDate >= toDate){
    window.availabilityVerified = false;
    if(msgEl) msgEl.innerHTML = '<div style="display:inline-block;padding:14px 28px;border-radius:12px;background:#FEE2E2;border:1px solid #FECACA;color:#991B1B;font-size:.95rem;font-weight:600;animation:fadeInMsg .4s ease"><i class="i-lucide-x-circle" style="margin-right:8px"></i> Check-in date must be before check-out date.</div>';
    return;
  }

  // Show loading spinner
  if(btn){
    btn.disabled = true;
    btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px"></span> Checking...';
  }

  // Simulate availability check (slight delay for UX)
  setTimeout(()=>{
    // Reset button text
    if(btn){
      btn.disabled = false;
      btn.innerHTML = '<i class="i-lucide-calendar-check"></i> Check Availability';
    }

    // Filter farms by room availability
    const filtered=source.filter(f=>(f.roomsAvailable||0)>0);

    if(filtered.length === 0){
      // No farms available
      window.availabilityVerified = false;
      if(msgEl) msgEl.innerHTML = '<div style="display:inline-block;padding:18px 32px;border-radius:14px;background:#FEE2E2;border:1px solid #FECACA;color:#991B1B;font-size:1rem;font-weight:600;animation:fadeInMsg .4s ease;box-shadow:0 4px 16px rgba(153,27,27,.12)"><i class="i-lucide-x-circle" style="margin-right:10px;font-size:1.2rem"></i> This farm is not available for the selected dates.</div>';
      container.innerHTML = '<p class="muted" style="text-align:center">No farms available for the selected dates.</p>';
      // Keep all book now buttons disabled
      document.querySelectorAll('.book-now-btn').forEach(b => {
        b.disabled = true;
        b.style.opacity = '0.5';
        b.style.cursor = 'not-allowed';
        b.style.pointerEvents = 'none';
        b.style.background = '#9CA3AF';
        b.style.borderColor = '#9CA3AF';
      });
    } else {
      // Farms available — mark verified
      window.availabilityVerified = true;
      if(msgEl) msgEl.innerHTML = '<div style="display:inline-block;padding:18px 32px;border-radius:14px;background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46;font-size:1rem;font-weight:600;animation:fadeInMsg .4s ease;box-shadow:0 4px 16px rgba(6,95,70,.12)"><i class="i-lucide-check-circle" style="margin-right:10px;font-size:1.2rem;color:#059669"></i> <b>Farm Available</b><br><span style="font-weight:400;font-size:.92rem">This farm is available for your selected dates.</span></div>';
      container.innerHTML = filtered.map(availabilityFarmCard).join('');
      // Enable all book now buttons
      document.querySelectorAll('.book-now-btn').forEach(b => {
        b.disabled = false;
        b.style.opacity = '1';
        b.style.cursor = 'pointer';
        b.style.pointerEvents = 'auto';
        b.style.background = 'var(--primary)';
        b.style.borderColor = 'var(--primary)';
      });
    }

    // Save availability state for progress band
    window.__availabilityState = {
      fromDate: new Date(fromDate).toLocaleDateString('en-GB', { day:'numeric', month:'short' }),
      toDate: new Date(toDate).toLocaleDateString('en-GB', { day:'numeric', month:'short' }),
      checkinTime: '2:00 PM',
      checkoutTime: '11:00 AM',
      fromDateRaw: fromDate,
      toDateRaw: toDate,
      availabilityVerified: true
    };
    window.availabilityVerified = true;

    // Refresh progress band
    const bp = document.querySelector('.booking-progress');
    if(bp){ bp.outerHTML = taskBand(2); }

    // Show feedback
    const fb = document.getElementById('av-feedback');
    if(fb){ 
      fb.textContent = filtered.length > 0 
        ? `${filtered.length} farm${filtered.length!==1?'s':''} available · ${window.__availabilityState.fromDate} → ${window.__availabilityState.toDate}` 
        : `No farms available for selected dates`;
      fb.style.display='block'; 
    }

    // Aesthetic message
    const aestMsgEl = document.getElementById('availability-message');
    if (aestMsgEl) {
      aestMsgEl.innerHTML = filtered.length > 0 
        ? `✨ Rooms are waiting for you in these beautiful farms ✨`
        : '';
    }
  }, 800);
}

function recalcBooking(base){
  const ci=document.getElementById('bk-checkin');
  const co=document.getElementById('bk-checkout');
  const guestsEl=document.getElementById('bk-guests');
  let nights=4;
  if(ci&&co&&ci.value&&co.value){
    const d1=new Date(ci.value), d2=new Date(co.value);
    nights=Math.max(1, Math.round((d2-d1)/(1000*60*60*24))||4);
  }
  const sub = base * nights;
  const cleaning = 3200;
  const service = 2240;
  const total = sub + cleaning + service;
  const nEl=document.getElementById('bk-nights'); if(nEl) nEl.textContent=nights;
  const subEl=document.getElementById('bk-sub'); if(subEl) subEl.textContent='₹'+sub.toLocaleString();
  const totEl=document.getElementById('bk-total'); if(totEl) totEl.textContent='₹'+total.toLocaleString();
  
  if (window.__bookingState) {
    window.__bookingState.guests = guestsEl ? guestsEl.value : 2;
    window.__bookingState.nights = nights;
    window.__bookingState.total = total;
  }
  
  updateBookingContinueState();
}

function updateBookingContinueState(){
  const terms=document.getElementById('ck-terms');
  const nonInclusions=document.getElementById('ck-noninclusions');
  const btn=document.getElementById('bookingContinueBtn');
  if(!terms||!nonInclusions||!btn) return;

  const ci = document.getElementById('bk-checkin');
  const co = document.getElementById('bk-checkout');

  const originalFrom = window.__availabilityState ? window.__availabilityState.fromDateRaw : null;
  const originalTo = window.__availabilityState ? window.__availabilityState.toDateRaw : null;
  const isVerified = (window.availabilityVerified === true) || (window.__availabilityState && window.__availabilityState.availabilityVerified === true);

  const datesExist = ci && co && ci.value && co.value;
  const datesMatch = ci && co && ci.value === originalFrom && co.value === originalTo;

  if (datesExist && datesMatch && isVerified) {
    btn.disabled = !(terms.checked && nonInclusions.checked);
  } else {
    btn.disabled = true;
  }
}

function handleBookingDateChange(price) {
  recalcBooking(price);

  const ci = document.getElementById('bk-checkin');
  const co = document.getElementById('bk-checkout');
  const msgArea = document.getElementById('bk-msg-area');
  const btn = document.getElementById('bookingContinueBtn');

  const originalFrom = window.__availabilityState ? window.__availabilityState.fromDateRaw : null;
  const originalTo = window.__availabilityState ? window.__availabilityState.toDateRaw : null;
  const originalVerified = window.__availabilityState ? window.__availabilityState.availabilityVerified : false;

  if (!ci || !co || !ci.value || !co.value) {
    window.availabilityVerified = false;
    if (window.__availabilityState) {
      window.__availabilityState.availabilityVerified = false;
      window.__availabilityState.fromDateRaw = (ci && ci.value) || '';
      window.__availabilityState.toDateRaw = (co && co.value) || '';
    }
    if (msgArea) {
      msgArea.style.display = 'block';
      msgArea.style.background = '#FEE2E2';
      msgArea.style.border = '1px solid #FECACA';
      msgArea.style.color = '#991B1B';
      msgArea.innerHTML = `<i class="i-lucide-alert-triangle" style="margin-right:6px"></i> Please check availability before booking.`;
    }
    if (btn) btn.disabled = true;
    return;
  }

  if (ci.value !== originalFrom || co.value !== originalTo || !originalVerified) {
    window.availabilityVerified = false;
    if (window.__availabilityState) {
      window.__availabilityState.availabilityVerified = false;
      window.__availabilityState.fromDateRaw = ci.value;
      window.__availabilityState.toDateRaw = co.value;
      window.__availabilityState.fromDate = new Date(ci.value).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
      window.__availabilityState.toDate = new Date(co.value).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    }
    if (msgArea) {
      msgArea.style.display = 'block';
      msgArea.style.background = '#FEF3C7';
      msgArea.style.border = '1px solid #FDE68A';
      msgArea.style.color = '#92400E';
      msgArea.innerHTML = `<i class="i-lucide-alert-triangle" style="margin-right:6px"></i> Your travel dates have changed. Please verify availability again.`;
    }
    if (btn) btn.disabled = true;
  } else {
    window.availabilityVerified = true;
    if (window.__availabilityState) {
      window.__availabilityState.availabilityVerified = true;
    }
    if (msgArea) {
      msgArea.style.display = 'none';
      msgArea.innerHTML = '';
    }
    updateBookingContinueState();
  }
}

function saveMyFarmProfile(){
  MY_FARM_PROFILE={
    name:document.getElementById('mfName').value.trim(),
    owner:document.getElementById('mfOwner').value.trim(),
    district:document.getElementById('mfDistrict').value,
    city:document.getElementById('mfCity').value,
    address:document.getElementById('mfAddress').value.trim(),
    pin:document.getElementById('mfPin').value.trim(),
    phone:document.getElementById('mfPhone').value.trim(),
    altPhone:document.getElementById('mfAltPhone').value.trim(),
    email:document.getElementById('mfEmail').value.trim(),
    food:document.getElementById('mfFood').value,
    checkin:document.getElementById('mfCheckin').value,
    checkout:document.getElementById('mfCheckout').value,
    tourist:document.getElementById('mfTourist').value.trim(),
    activitiesText:document.getElementById('mfActivities').value.trim(),
    rooms:document.getElementById('mfRooms').value.trim(),
    price:document.getElementById('mfPrice').value.trim()
  };

  /* Turn the comma-separated text fields into clean arrays/strings that
     match the shape every other farm record in FARMS already uses. */
  const activities=MY_FARM_PROFILE.activitiesText
    .split(',').map(s=>s.trim()).filter(Boolean);

  const farmRecord={
    id:MY_FARM_ID!==null?MY_FARM_ID:(Math.max(0,...FARMS.map(f=>f.id))+1),
    status:"Pending",
    name:MY_FARM_PROFILE.name||'Untitled Farm',
    city:MY_FARM_PROFILE.city,
    district:MY_FARM_PROFILE.district,
    foodpreference:MY_FARM_PROFILE.food,
    touristPlaces:MY_FARM_PROFILE.tourist,
    activities:activities,
    nearbyFarms:"",
    rooms:MY_FARM_PROFILE.rooms||'-',
    location:[MY_FARM_PROFILE.city,MY_FARM_PROFILE.district].filter(Boolean).join(', '),
    price:Number(MY_FARM_PROFILE.price)||0,
    rating:0,
    reviews:0,
    img:MY_FARM_MEDIA.find(m=>m.type==='image')?.url || 'https://images.unsplash.com/photo-1500076656116-558758c991c1?w=900'
  };

  const idx=FARMS.findIndex(f=>f.id===farmRecord.id);
  if(idx>-1) FARMS[idx]=farmRecord; else FARMS.push(farmRecord);
  MY_FARM_ID=farmRecord.id;

  /* Home page filters (city/district/tourist/food/activity) and the admin
     farm table both read live from FARMS, so they pick this up automatically
     the next time they render — no extra wiring needed. */

  alert('✅ Farm details saved! It now appears in Farm Management and in home page filters.');
}

function handleMyFarmMedia(input){
  Array.from(input.files||[]).forEach(file=>{
    const url=URL.createObjectURL(file);
    MY_FARM_MEDIA.push({url,type:file.type.startsWith('video')?'video':'image',name:file.name});
  });
  input.value='';
  renderMyFarmMedia();
}
function removeMyFarmMedia(idx){
  MY_FARM_MEDIA.splice(idx,1);
  renderMyFarmMedia();
}
function renderMyFarmMedia(){
  const grid=document.getElementById('myFarmMediaGrid');
  if(!grid)return;
  grid.innerHTML=MY_FARM_MEDIA.map((m,i)=>`
    <div class="media-thumb">
      ${m.type==='video'?`<video src="${m.url}" controls></video>`:`<img src="${m.url}">`}
      <button type="button" class="media-remove" onclick="removeMyFarmMedia(${i})"><i class="i-lucide-x"></i></button>
    </div>`).join('')+
    `<label class="media-add">
      <input type="file" accept="image/*,video/*" multiple style="display:none" onchange="handleMyFarmMedia(this)">
      <i class="i-lucide-plus"></i><span>Add photos / videos</span>
    </label>`;
}

    pendingDeleteId = id;
    document.getElementById("deleteFarmName").textContent = farm.name;

    pendingDeleteId = null;

    if (pendingDeleteId === null) return;
    const idx = FARMS.findIndex(f => String(f.id) === String(pendingDeleteId));
    if (idx > -1) FARMS.splice(idx, 1);
    closeDeleteConfirm();
    loadFarmTable();
}

            <td>${farm.district}</td>
            <td>${farm.city}</td>
            <td><span class="pill ${statusPillClass(status)}">${status}</span></td>
            <td>
                <div class="row" style="gap:8px;flex-wrap:nowrap">
                    <button class="btn btn-outline btn-sm" onclick="editFarm('${farm.id}')">
                        <i class="i-lucide-pencil"></i> Edit
                    </button>
                    <button class="btn btn-outline btn-sm danger" onclick="confirmDeleteFarm('${farm.id}')">
                        <i class="i-lucide-trash-2"></i> Delete
                    </button>
                </div>
            </td>
        </tr>`;
    });

}
</script>
