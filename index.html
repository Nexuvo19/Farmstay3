<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Greenstead — Luxury Farm Stay Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.460.0/font/lucide.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --primary:#1B5E20; --primary-2:#2E7D32; --accent:#D4AF37;
  --bg:#FAFAF7; --card:#FFFFFF; --text:#1F2937; --muted:#6B7280;
  --border:#E7E5DE; --soft:#F1EFE8; --danger:#B3261E;
  --shadow-sm:0 1px 2px rgba(20,30,15,.05),0 1px 1px rgba(20,30,15,.04);
  --shadow:0 8px 24px rgba(20,30,15,.07),0 2px 6px rgba(20,30,15,.04);
  --shadow-lg:0 24px 60px rgba(20,30,15,.12);
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em;margin:0 0 .4em}
h1{font-size:clamp(2.2rem,5vw,3.6rem);line-height:1.05}
h2{font-size:clamp(1.6rem,3vw,2.2rem)}
h3{font-size:1.2rem}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.container{max-width:1240px;margin:0 auto;padding:0 24px}
.muted{color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--soft);color:var(--primary);padding:6px 12px;border-radius:999px;font-size:.78rem;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;padding:11px 18px;border-radius:10px;font-weight:600;font-size:.92rem;cursor:pointer;transition:all .2s ease;background:transparent;color:var(--text);font-family:inherit}
.btn i{font-size:1rem}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#16441a;transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-gold{background:var(--accent);color:#1a1a1a}
.btn-gold:hover{background:#c4a02f}
.btn-outline{border-color:var(--border);background:#fff}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost:hover{background:var(--soft)}
.btn-sm{padding:8px 12px;font-size:.82rem;border-radius:8px}
.btn-block{width:100%;justify-content:center}
input,select,textarea{font-family:inherit;font-size:.92rem;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:#fff;width:100%;color:var(--text);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(27,94,32,.08)}
label{display:block;font-size:.8rem;font-weight:600;margin-bottom:6px;color:#374151}
.grid{display:grid;gap:24px}
.row{display:flex;gap:16px;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden}
.pad{padding:24px}
.divider{height:1px;background:var(--border);margin:20px 0}

/* Header */
header.nav{position:sticky;top:0;z-index:50;background:rgba(250,250,247,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1320px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;color:var(--primary)}
.logo .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:grid;place-items:center;color:#fff;font-size:1.05rem}
nav.links{display:flex;gap:6px}
nav.links a{padding:8px 14px;border-radius:8px;font-size:.9rem;font-weight:500;color:#374151}
nav.links a:hover{background:var(--soft);color:var(--primary)}
.nav-actions{display:flex;gap:8px;align-items:center}
.menu-btn{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text)}
@media(max-width:900px){nav.links{display:none}.menu-btn{display:block}.nav-actions .btn:not(.btn-primary){display:none}}

/* Hero */
.hero{position:relative;padding:80px 0 60px;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:-1;background:
  radial-gradient(1200px 600px at 80% -10%,#e8efe2 0%,transparent 60%),
  radial-gradient(900px 500px at -10% 110%,#f3ecd4 0%,transparent 60%),
  var(--bg)}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center}
@media(max-width:900px){.hero-grid{grid-template-columns:1fr}}
.hero h1 span{color:var(--primary);font-style:italic}
.hero p.lead{font-size:1.1rem;color:#4b5563;max-width:540px;margin:18px 0 28px}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap}
.hero-stats{display:flex;gap:32px;margin-top:36px;flex-wrap:wrap}
.hero-stats div b{display:block;font-family:'Fraunces',serif;font-size:1.8rem;color:var(--primary)}
.hero-img{aspect-ratio:4/5;border-radius:24px;overflow:hidden;box-shadow:var(--shadow-lg);background:#ddd url('https://images.unsplash.com/photo-1500076656116-558758c991c1?w=900') center/cover}
.hero-img-2{position:absolute;width:200px;aspect-ratio:1;border-radius:18px;right:-20px;bottom:-30px;background:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400') center/cover;box-shadow:var(--shadow-lg);border:6px solid #fff}
.hero-img-wrap{position:relative}

/* Search bar */
.search-bar{background:#fff;border-radius:18px;padding:10px;box-shadow:var(--shadow);display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr auto;gap:6px;border:1px solid var(--border);margin-top:32px}
.search-bar .field{padding:10px 14px;border-radius:12px;cursor:pointer}
.search-bar .field:hover{background:var(--soft)}
.search-bar .field label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:2px}
.search-bar .field input{border:none;padding:0;font-weight:600;background:transparent}
.search-bar .field input:focus{box-shadow:none}
.search-bar button{align-self:center;margin:4px}
@media(max-width:780px){.search-bar{grid-template-columns:1fr 1fr;gap:4px}.search-bar button{grid-column:span 2;width:auto}}

/* Sections */
section.block{padding:70px 0}
.section-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.section-head .sub{color:var(--muted);max-width:540px;margin-top:6px}

/* Cards grid */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.farm-card{background:#fff;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);transition:all .25s;cursor:pointer}
.farm-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:#d8d3c4}
.farm-card .thumb{aspect-ratio:4/3;background-size:cover;background-position:center;position:relative}
.farm-card .thumb .fav{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;color:#333;border:none;cursor:pointer}
.farm-card .thumb .fav:hover{color:var(--danger)}
.farm-card .info{padding:16px 18px 20px}
.farm-card .info .loc{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.85rem;margin-bottom:4px}
.farm-card .info .loc .rating{color:var(--text);display:flex;align-items:center;gap:4px;font-weight:600}
.farm-card .info .loc .rating i{color:var(--accent)}
.farm-card .info h3{font-family:'Inter',sans-serif;font-size:1rem;margin:2px 0 6px;font-weight:600}
.farm-card .info .tags{color:var(--muted);font-size:.84rem;margin-bottom:10px}
.farm-card .price{font-weight:700;color:var(--text)}
.farm-card .price span{color:var(--muted);font-weight:500;font-size:.85rem}

/* Destinations */
.dest-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:240px 240px;gap:18px}
.dest{border-radius:16px;background-size:cover;background-position:center;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s}
.dest:hover{transform:scale(1.01)}
.dest::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent 60%)}
.dest .label{position:absolute;left:18px;bottom:14px;color:#fff;z-index:1}
.dest .label b{font-family:'Fraunces',serif;font-size:1.3rem;display:block}
.dest:nth-child(1){grid-row:span 2}
@media(max-width:780px){.dest-grid{grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,180px)}.dest:nth-child(1){grid-row:auto;grid-column:span 2}}

/* Activities */
.act-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px}
.act{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 18px;text-align:center;transition:.2s;cursor:pointer}
.act:hover{border-color:var(--primary);background:linear-gradient(180deg,#fff,#f4f7f1)}
.act i{font-size:1.8rem;color:var(--primary);background:var(--soft);width:54px;height:54px;border-radius:14px;display:grid;place-items:center;margin:0 auto 10px}
.act b{display:block;margin-bottom:2px}
.act span{color:var(--muted);font-size:.82rem}

/* Why */
.why{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px}
.why .item{padding:24px;border:1px solid var(--border);border-radius:14px;background:#fff}
.why .item i{color:var(--accent);font-size:1.5rem;background:#fbf6e3;width:48px;height:48px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px}

/* Testimonials */
.tst-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.tst{padding:28px;border-radius:16px;background:linear-gradient(180deg,#fff,#f6f4ec);border:1px solid var(--border)}
.tst .stars{color:var(--accent);margin-bottom:10px}
.tst .who{display:flex;gap:12px;align-items:center;margin-top:18px}
.tst .who img{width:42px;height:42px;border-radius:50%;object-fit:cover}

/* CTA */
.cta{background:linear-gradient(135deg,var(--primary),#0f3b13);color:#fff;border-radius:24px;padding:60px;display:grid;grid-template-columns:1.5fr 1fr;align-items:center;gap:30px;position:relative;overflow:hidden}
.cta::before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(212,175,55,.15);right:-80px;top:-80px}
.cta h2{color:#fff}
.cta p{opacity:.85;max-width:480px}
@media(max-width:780px){.cta{grid-template-columns:1fr;padding:36px}}

/* Footer */
footer{background:#11281a;color:#cfd8d0;padding:60px 0 24px;margin-top:60px}
footer h4{color:#fff;font-family:'Inter',sans-serif;font-size:.95rem;margin-bottom:14px}
.foot-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:30px}
@media(max-width:780px){.foot-grid{grid-template-columns:1fr 1fr}}
footer a{display:block;padding:5px 0;font-size:.88rem;color:#a8b6ab}
footer a:hover{color:#fff}
.foot-bottom{margin-top:40px;padding-top:20px;border-top:1px solid #1f3a26;display:flex;justify-content:space-between;color:#7c8b80;font-size:.82rem;flex-wrap:wrap;gap:12px}

/* Auth */
.auth-wrap{min-height:calc(100vh - 80px);display:grid;grid-template-columns:1fr 1fr}
.auth-side{background:linear-gradient(135deg,#1B5E20,#0f3b13) url('https://images.unsplash.com/photo-1500076656116-558758c991c1?w=1200') center/cover;background-blend-mode:overlay;display:flex;flex-direction:column;justify-content:end;padding:50px;color:#fff}
.auth-side h2{color:#fff}
.auth-form{padding:60px;display:flex;flex-direction:column;justify-content:center;max-width:520px;margin:0 auto;width:100%}
@media(max-width:880px){.auth-wrap{grid-template-columns:1fr}.auth-side{min-height:200px;padding:24px}.auth-form{padding:30px}}

/* Dashboard */
.dash{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 70px)}
.side{background:#fff;border-right:1px solid var(--border);padding:24px 16px}
.side .me{display:flex;gap:10px;align-items:center;padding:10px;border-radius:10px;background:var(--soft);margin-bottom:20px}
.side .me .av{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:700}
.side nav a{display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:8px;color:#374151;font-size:.9rem;font-weight:500;margin-bottom:2px;cursor:pointer}
.side nav a:hover,.side nav a.active{background:var(--soft);color:var(--primary)}
.side .sec{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:18px 12px 8px}
.dash-main{padding:32px;background:var(--bg)}
@media(max-width:880px){.dash{grid-template-columns:1fr}.side{display:none}}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:24px}
.stat{background:#fff;padding:20px;border-radius:14px;border:1px solid var(--border)}
.stat .lab{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.05em}
.stat b{display:block;font-size:1.7rem;font-family:'Fraunces',serif;color:var(--primary);margin:4px 0 2px}
.stat .delta{color:#0a7d2a;font-size:.78rem;font-weight:600}
.stat .delta.neg{color:#c93535}

.table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--border);font-size:.9rem}
.table th,.table td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--border)}
.table th{background:#fafaf5;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.table tr:last-child td{border:none}
.pill{padding:4px 10px;border-radius:999px;font-size:.74rem;font-weight:600;display:inline-block}
.pill.ok{background:#e8f5ea;color:#0a7d2a}
.pill.warn{background:#fff4d6;color:#8a6300}
.pill.bad{background:#fde7e6;color:#9a1d18}
.pill.info{background:#e6effb;color:#1f4fa3}

/* Gallery */
.gal{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:240px 240px;gap:8px;border-radius:18px;overflow:hidden}
.gal div{background-size:cover;background-position:center}
.gal div:nth-child(1){grid-row:span 2}
@media(max-width:780px){.gal{grid-template-columns:1fr 1fr;grid-template-rows:200px}.gal div:nth-child(1){grid-row:auto;grid-column:span 2;height:220px}}

.detail-grid{display:grid;grid-template-columns:1fr 380px;gap:40px;margin-top:30px}
@media(max-width:980px){.detail-grid{grid-template-columns:1fr}}
.book-card{position:sticky;top:90px;border:1px solid var(--border);border-radius:16px;padding:24px;background:#fff;box-shadow:var(--shadow)}

.amenity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.amenity{display:flex;gap:10px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:10px}
.amenity i{color:var(--primary)}

/* Notif */
.notif{display:flex;gap:14px;padding:16px;border:1px solid var(--border);border-radius:12px;background:#fff;align-items:start;margin-bottom:10px}
.notif .ic{width:40px;height:40px;border-radius:10px;background:var(--soft);color:var(--primary);display:grid;place-items:center;flex-shrink:0}

/* Mobile menu drawer */
.drawer{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none}
.drawer.open{display:block}
.drawer .panel{background:#fff;width:280px;height:100%;padding:24px;display:flex;flex-direction:column;gap:6px}
.drawer .panel a{padding:12px;border-radius:8px;font-weight:500}
.drawer .panel a:hover{background:var(--soft)}

/* 404 */
.fourofour{min-height:80vh;display:grid;place-items:center;text-align:center;padding:40px}
.fourofour .code{font-family:'Fraunces',serif;font-size:9rem;color:var(--primary);line-height:1}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================
   DATA
========================= */
const FARMS = [
  {id:1,name:"Goldenmeadow Estate",loc:"Tuscany, Italy",price:340,rating:4.94,reviews:218,img:"https://images.unsplash.com/photo-1500076656116-558758c991c1?w=900",tags:"Vineyard · 4 guests · 2 bedrooms",amenities:["Wifi","Pool","Vineyard tour","Breakfast","Pet friendly","Fireplace"]},
  {id:2,name:"Olive Grove Retreat",loc:"Provence, France",price:285,rating:4.88,reviews:142,img:"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=900",tags:"Olive farm · 6 guests · 3 bedrooms",amenities:["Wifi","Hot tub","Olive tasting","Bicycles","Garden","Kitchen"]},
  {id:3,name:"Rosewater Orchard",loc:"Kashmir, India",price:160,rating:4.91,reviews:97,img:"https://images.unsplash.com/photo-1542718610-a1d656d1884c?w=900",tags:"Apple orchard · 4 guests",amenities:["Wifi","Mountain view","Bonfire","Trekking","Local meals"]},
  {id:4,name:"Cobblestone Dairy Farm",loc:"Cotswolds, UK",price:220,rating:4.86,reviews:188,img:"https://images.unsplash.com/photo-1517825738774-7de9363ef735?w=900",tags:"Dairy farm · 5 guests · 2 bedrooms",amenities:["Wifi","Cheese making","Animal feeding","Fireplace"]},
  {id:5,name:"Saffron Valley Lodge",loc:"La Mancha, Spain",price:195,rating:4.79,reviews:64,img:"https://images.unsplash.com/photo-1505881502353-a1986add3762?w=900",tags:"Saffron farm · 4 guests",amenities:["Wifi","Pool","Cooking class","Sunset terrace"]},
  {id:6,name:"Honey Cedar Ranch",loc:"Montana, USA",price:410,rating:4.97,reviews:312,img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=900",tags:"Ranch · 8 guests · 4 bedrooms",amenities:["Wifi","Horse riding","River fishing","Sauna"]},
  {id:7,name:"Lavender Hill Cottage",loc:"Hokkaido, Japan",price:265,rating:4.92,reviews:108,img:"https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=900",tags:"Lavender farm · 2 guests",amenities:["Wifi","Onsen","Tea ceremony","Garden"]},
  {id:8,name:"Wildgrass Plantation",loc:"Coorg, India",price:140,rating:4.83,reviews:201,img:"https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?w=900",tags:"Coffee plantation · 4 guests",amenities:["Wifi","Coffee tour","Waterfall trek","Bonfire"]},
];
const DESTINATIONS=[
  {name:"Tuscany",count:"128 stays",img:"https://images.unsplash.com/photo-1499678329028-101435549a4e?w=900"},
  {name:"Provence",count:"86 stays",img:"https://images.unsplash.com/photo-1499678329028-101435549a4e?w=600"},
  {name:"Kashmir",count:"42 stays",img:"https://images.unsplash.com/photo-1566552881560-0be862a7c445?w=600"},
  {name:"Cotswolds",count:"71 stays",img:"https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600"},
  {name:"Hokkaido",count:"35 stays",img:"https://images.unsplash.com/photo-1528164344705-47542687000d?w=600"},
];
const ACTIVITIES=[
  {i:"sprout",t:"Organic Farming",s:"Hands-on harvest"},
  {i:"wine",t:"Wine Tasting",s:"Vineyard tours"},
  {i:"flame",t:"Bonfire Nights",s:"Stargazing"},
  {i:"horse",t:"Horse Riding",s:"Open trails"},
  {i:"fish",t:"River Fishing",s:"Catch & cook"},
  {i:"chef-hat",t:"Farm Cuisine",s:"Cooking class"},
  {i:"bike",t:"Cycling",s:"Country roads"},
  {i:"trees",t:"Forest Walks",s:"Guided hikes"},
];
const REVIEWS=[
  {n:"Amelia Carter",t:"An unforgettable week among olive groves. Hosts were extraordinary, the food was straight from the field.",img:"https://i.pravatar.cc/100?img=47"},
  {n:"Rohan Mehta",t:"Greenstead curated a truly luxurious retreat. Every detail – the linens, the dinners, the views – was perfect.",img:"https://i.pravatar.cc/100?img=12"},
  {n:"Sofia Bianchi",t:"Booked three stays this year. The quality and authenticity is unmatched. Highly recommend the Tuscany estate.",img:"https://i.pravatar.cc/100?img=32"},
];

/* =========================
   ROUTER (hash + new tab)
========================= */
const ROUTES={};
function route(name,fn){ROUTES[name]=fn}
function go(name,params={}){
  const q=new URLSearchParams(params).toString();
  window.open('#/'+name+(q?'?'+q:''),'_blank');
}
function navInPlace(name,params={}){
  const q=new URLSearchParams(params).toString();
  location.hash='#/'+name+(q?'?'+q:'');
}
window.go=go;window.navInPlace=navInPlace;
function currentRoute(){
  const h=location.hash.replace(/^#\//,'')||'home';
  const [name,qs]=h.split('?');
  const params=Object.fromEntries(new URLSearchParams(qs||''));
  return {name,params};
}
function render(){
  const {name,params}=currentRoute();
  const fn=ROUTES[name]||ROUTES['404'];
  document.getElementById('app').innerHTML=fn(params);
  document.title=(({
    home:'Greenstead — Luxury Farm Stays',about:'About · Greenstead',search:'Search Farms · Greenstead',
    listings:'Farm Listings · Greenstead',details:'Farm Details · Greenstead',booking:'Booking · Greenstead',
